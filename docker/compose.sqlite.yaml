services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      Database__Provider: Sqlite
      ConnectionStrings__Sqlite: "Data Source=/data/starter.db"
      Jwt__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY required - copy .env.example to .env and set a 32+ byte base64 value}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN:-http://localhost:8080}
    volumes:
      - starter-data:/data
    restart: unless-stopped

volumes:
  starter-data: {}
